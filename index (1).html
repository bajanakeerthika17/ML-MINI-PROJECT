<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie Rating Predictor Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card" id="input-card">
            <h1>🎬 Movie Predictor</h1>
            <p class="subtitle">Search real IMDb ratings or predict using AI</p>
            
            <form id="prediction-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Movie Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter movie name (e.g. KGF, Inception)" required>
                    </div>
                </div>

                <div class="form-row flex">
                    <div class="form-group flex-1">
                        <label for="genre">Fallback Genre</label>
                        <select id="genre" name="genre">
                            <option value="Action">Action</option>
                            <option value="Drama">Drama</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Horror">Horror</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label for="year">Release Year</label>
                        <input type="number" id="year" name="year" value="2024">
                    </div>
                </div>
                
                <div class="form-row flex">
                    <div class="form-group flex-1">
                        <label for="budget">Budget (Million $)</label>
                        <input type="number" id="budget" name="budget" placeholder="100" step="0.1">
                    </div>
                    <div class="form-group flex-1">
                        <label for="duration">Duration (Min)</label>
                        <input type="number" id="duration" name="duration" placeholder="120">
                    </div>
                </div>
                
                <button type="submit" class="predict-btn" id="predict-btn">Get Rating</button>
            </form>
        </div>

        <!-- Movie Result Card -->
        <div class="movie-result-card" id="result-card">
            <div class="poster-section">
                <img src="{{ url_for('static', filename='poster_placeholder.png') }}" alt="Movie Poster" id="res-poster">
                <div class="rating-badge" id="res-rating">8.1</div>
                <div id="verify-badge" class="verify-tag">✓ VERIFIED IMDB</div>
            </div>
            <div class="details-section">
                <h2 id="res-name">Movie Name</h2>
                <div class="meta-info">
                    <span id="res-genre">Genre</span> • <span id="res-year">2024</span>
                </div>
                <p class="description" id="res-desc">Movie details loaded from IMDb.</p>
                <div class="card-footer">
                    <button class="view-details-btn">View Details</button>
                    <button class="back-btn" onclick="resetForm()">New Search</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const predictionForm = document.getElementById('prediction-form');
        const inputCard = document.getElementById('input-card');
        const resultCard = document.getElementById('result-card');

        predictionForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const predictBtn = document.getElementById('predict-btn');
            const formData = new FormData(predictionForm);
            
            predictBtn.innerText = 'Searching...';
            predictBtn.disabled = true;
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Update result card
                    document.getElementById('res-name').innerText = data.name;
                    document.getElementById('res-genre').innerText = data.genre;
                    document.getElementById('res-year').innerText = data.year;
                    document.getElementById('res-rating').innerText = data.rating;
                    
                    // Update Poster (use API poster if available, else our placeholder)
                    const posterImg = document.getElementById('res-poster');
                    if (data.poster) {
                        posterImg.src = data.poster;
                    } else {
                        posterImg.src = "{{ url_for('static', filename='poster_placeholder.png') }}";
                    }
                    
                    // Show/Hide Verify Badge
                    const verifyBadge = document.getElementById('verify-badge');
                    const descText = document.getElementById('res-desc');
                    
                    if (data.is_real) {
                        verifyBadge.style.display = 'block';
                        descText.innerHTML = `<strong>Live Data:</strong> This is the official IMDb rating for <em>${data.name}</em>.`;
                    } else {
                        verifyBadge.style.display = 'none';
                        descText.innerHTML = `<strong>AI Prediction:</strong> No exact match found. This is a predicted rating based on the provided features.`;
                    }
                    
                    // Show result card
                    inputCard.style.display = 'none';
                    resultCard.classList.add('show');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('Connection error.');
            } finally {
                predictBtn.innerText = 'Get Rating';
                predictBtn.disabled = false;
            }
        });

        function resetForm() {
            resultCard.classList.remove('show');
            setTimeout(() => {
                inputCard.style.display = 'block';
                predictionForm.reset();
            }, 300);
        }
    </script>
</body>
</html>
